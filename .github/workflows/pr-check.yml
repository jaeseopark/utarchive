name: PR Check

permissions:
  issues: write

on:
  pull_request:
    branches:
      - master

jobs:
  typecheck:
    name: Run TypeScript type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Add dependency upgrade suggestion comment
        if: github.event.pull_request != null
        uses: actions/github-script@v7
        with:
          script: .github/workflows/dependency-comment.js
