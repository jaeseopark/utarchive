name: PR Check

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - master

jobs:
  typecheck:
    name: Run TypeScript type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test
