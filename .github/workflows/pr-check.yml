name: PR Check

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - master

jobs:
  typecheck:
    name: Run TypeScript type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Run NPM outdated check
        uses: cssnr/npm-outdated-action@079630473e35143187b4432e69c664de3ceebc94
        with:
          heading: '### NPM Outdated Check'
          latest: 'true'
          ncu: 'false'
          update: 'false'
          link: 'true'
          summary: 'true'
