name: PR Check

permissions:
  issues: write

on:
  pull_request:
    branches:
      - master

jobs:
  typecheck:
    name: Run TypeScript type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Save dependency outdated report
        run: |
          mkdir -p tmp
          npm outdated --json > tmp/outdated.json || true

      - name: Add dependency upgrade suggestion comment
        if: github.event.pull_request != null
        uses: actions/github-script@v7
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
        with:
          script: |
            const fs = require('fs');
            const script = fs.readFileSync('.github/workflows/dependency-comment.js', 'utf8');
            await eval(`(async () => {\n${script}\n})()`);
